<svg viewBox="0 0 980 560" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2b3440"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="980" height="560" fill="#ffffff"/>

  <text x="490" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1f26">spi_master.v &#8212; FSM (2-bit state register)</text>
  <text x="490" y="56" text-anchor="middle" font-size="13" fill="#5b6570">One shift/sample event occurs every CLKS_PER_HALF_BIT clk cycles; CPOL/CPHA select which of the two edges samples vs. shifts</text>

  <!-- IDLE -->
  <circle cx="150" cy="300" r="70" fill="#eaf2ff" stroke="#2b6cb0" stroke-width="2.5"/>
  <text x="150" y="294" text-anchor="middle" font-size="19" font-weight="700" fill="#1a3a5c">IDLE</text>
  <text x="150" y="315" text-anchor="middle" font-size="12" fill="#3a536b">2'b00</text>

  <!-- SHIFT -->
  <circle cx="490" cy="300" r="70" fill="#fff4e5" stroke="#c9720b" stroke-width="2.5"/>
  <text x="490" y="294" text-anchor="middle" font-size="19" font-weight="700" fill="#7a4a05">SHIFT</text>
  <text x="490" y="315" text-anchor="middle" font-size="12" fill="#8a5a15">2'b01</text>

  <!-- DONE -->
  <circle cx="830" cy="300" r="70" fill="#eafaf0" stroke="#2f9e5b" stroke-width="2.5"/>
  <text x="830" y="294" text-anchor="middle" font-size="19" font-weight="700" fill="#1c6b3c">DONE</text>
  <text x="830" y="315" text-anchor="middle" font-size="12" fill="#2c7b4c">2'b10</text>

  <!-- IDLE -> SHIFT -->
  <path d="M 220,290 C 300,270 340,270 420,285" fill="none" stroke="#2b3440" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="320" y="255" text-anchor="middle" font-size="12.5" fill="#2b3440">spi_en &amp;&amp; !tx_empty</text>
  <text x="320" y="272" text-anchor="middle" font-size="11" fill="#5b6570">load tx_shift_reg &#8592; tx_data</text>
  <text x="320" y="287" text-anchor="middle" font-size="11" fill="#5b6570">mosi &#8592; tx_data[7], bit_count &#8592; 7</text>

  <!-- SHIFT -> DONE -->
  <path d="M 560,290 C 650,270 690,270 760,285" fill="none" stroke="#2b3440" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="660" y="255" text-anchor="middle" font-size="12.5" fill="#2b3440">bit_count == 0 on sample edge</text>
  <text x="660" y="272" text-anchor="middle" font-size="11" fill="#5b6570">(8th bit just sampled)</text>

  <!-- DONE -> IDLE (long return arrow underneath) -->
  <path d="M 800,362 C 700,440 280,440 175,368" fill="none" stroke="#2b3440" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="490" y="455" text-anchor="middle" font-size="12.5" fill="#2b3440">unconditional, 1 cycle</text>
  <text x="490" y="472" text-anchor="middle" font-size="11" fill="#5b6570">rx_data &#8592; rx_shift_reg, rx_wr_en pulses, cs_n &#8592; 1</text>

  <!-- IDLE self-loop -->
  <path d="M 110,240 C 90,190 130,160 150,200 C 165,225 150,238 130,242" fill="none" stroke="#2b3440" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="150" y="150" text-anchor="middle" font-size="12" fill="#2b3440">!spi_en || tx_empty</text>
  <text x="150" y="167" text-anchor="middle" font-size="11" fill="#5b6570">cs_n=1, spi_busy=0</text>

  <!-- SHIFT self-loop -->
  <path d="M 450,240 C 430,190 470,160 490,200 C 505,225 490,238 470,242" fill="none" stroke="#2b3440" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="490" y="150" text-anchor="middle" font-size="12" fill="#2b3440">bit_count != 0</text>
  <text x="490" y="167" text-anchor="middle" font-size="11" fill="#5b6570">toggle sclk every CLKS_PER_HALF_BIT</text>
  <text x="490" y="182" text-anchor="middle" font-size="11" fill="#5b6570">sample edge: shift rx_shift_reg, bit_count--</text>
  <text x="490" y="197" text-anchor="middle" font-size="11" fill="#5b6570">shift edge: mosi &#8592; tx_shift_reg[bit_count]</text>

  <!-- reset arrow into IDLE -->
  <path d="M 20,300 L 78,300" fill="none" stroke="#2b3440" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="45" y="288" text-anchor="middle" font-size="11.5" fill="#2b3440">!rst_n</text>

  <!-- legend / note box -->
  <rect x="60" y="500" width="860" height="46" rx="6" fill="#f6f7f9" stroke="#d7dce1"/>
  <text x="90" y="522" font-size="11.5" fill="#3a4149">Sample vs. shift edge is chosen per-toggle by (sclk==cpol &amp;&amp; cpha==0) || (sclk!=cpol &amp;&amp; cpha==1):</text>
  <text x="90" y="538" font-size="11.5" fill="#3a4149">CPHA=0 samples on the leading edge and shifts on the trailing edge; CPHA=1 does the reverse. mosi is preloaded with tx_data[7] on load so bit 0 is valid before the first edge (CPHA=0).</text>
</svg>
