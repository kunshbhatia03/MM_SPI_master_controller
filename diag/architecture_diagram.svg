<svg viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="black"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="460" fill="white"/>

  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold">SPI Master Controller - Block Diagram</text>

  <!-- spi_reg_map -->
  <rect x="150" y="170" width="170" height="120" fill="white" stroke="black" stroke-width="2"/>
  <text x="235" y="220" text-anchor="middle" font-size="14" font-weight="bold">spi_reg_map</text>
  <text x="235" y="240" text-anchor="middle" font-size="11">(CR, SR, TDR, RDR)</text>

  <!-- tx_fifo -->
  <rect x="400" y="80" width="150" height="80" fill="white" stroke="black" stroke-width="2"/>
  <text x="475" y="115" text-anchor="middle" font-size="14" font-weight="bold">TX FIFO</text>
  <text x="475" y="135" text-anchor="middle" font-size="11">(sync_fifo)</text>

  <!-- rx_fifo -->
  <rect x="400" y="300" width="150" height="80" fill="white" stroke="black" stroke-width="2"/>
  <text x="475" y="335" text-anchor="middle" font-size="14" font-weight="bold">RX FIFO</text>
  <text x="475" y="355" text-anchor="middle" font-size="11">(sync_fifo)</text>

  <!-- spi_master -->
  <rect x="650" y="170" width="160" height="120" fill="white" stroke="black" stroke-width="2"/>
  <text x="730" y="220" text-anchor="middle" font-size="14" font-weight="bold">spi_master</text>
  <text x="730" y="240" text-anchor="middle" font-size="11">(FSM)</text>

  <!-- CPU bus signals, well clear of the box -->
  <text x="10" y="190" font-size="12">bus_addr</text>
  <text x="10" y="208" font-size="12">bus_wdata</text>
  <text x="10" y="226" font-size="12">bus_wr_en</text>
  <text x="10" y="244" font-size="12">bus_rd_en</text>
  <text x="10" y="264" font-size="12">bus_rdata</text>
  <path d="M90,186 L150,206" stroke="black" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M100,204 L150,214" stroke="black" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M100,222 L150,222" stroke="black" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M100,240 L150,230" stroke="black" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M150,250 L94,260" stroke="black" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- reg_map -> tx_fifo -->
  <path d="M320,195 L400,128" stroke="black" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- rx_fifo -> reg_map -->
  <path d="M400,332 L320,262" stroke="black" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- tx_fifo -> spi_master -->
  <path d="M550,128 L650,205" stroke="black" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- spi_master -> rx_fifo -->
  <path d="M650,252 L550,332" stroke="black" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- spi_master pins, labels clear of the arrows -->
  <path d="M812,195 L860,195" stroke="black" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M812,225 L860,225" stroke="black" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M860,255 L812,255" stroke="black" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M812,275 L860,275" stroke="black" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="868" y="199" font-size="12">sclk</text>
  <text x="868" y="229" font-size="12">mosi</text>
  <text x="868" y="259" font-size="12">miso</text>
  <text x="868" y="279" font-size="12">cs_n</text>

  <text x="450" y="420" text-anchor="middle" font-size="12">Data flows: CPU bus &#8594; spi_reg_map &#8594; TX FIFO &#8594; spi_master &#8594; SPI pins</text>
  <text x="450" y="440" text-anchor="middle" font-size="12">Received data flows back: SPI pins &#8594; spi_master &#8594; RX FIFO &#8594; spi_reg_map &#8594; CPU bus</text>
</svg>
